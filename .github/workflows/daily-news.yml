# ============================================================
# AIBeat — Daily News Automation
# Runs every day at 7:00 AM UTC
# Fetches AI news → Gemini writes article → saves to Sanity
# ============================================================

name: Daily AI News Automation

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 AM UTC every day
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run news automation
        env:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: uk52fboh
          NEXT_PUBLIC_SANITY_DATASET: production
        run: npx tsx scripts/fetch-and-post.ts

      - name: Report status
        if: always()
        run: echo "✅ Daily news automation complete"
