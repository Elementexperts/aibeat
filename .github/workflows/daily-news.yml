# ============================================================
# AIBeat — Daily News Automation
# Runs 3x per day: 7:00, 12:00, 18:00 UTC
# Fetches AI news → Groq writes article → opens GitHub PR for review
# Merge the PR to publish. Close it to reject.
# ============================================================

name: Daily AI News Automation

on:
  schedule:
    - cron: '0 7  * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run news automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          ARTICLE_LIMIT: 1
        run: npx tsx scripts/fetch-and-post.ts

      - name: Open draft PR if article was written
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "AIBeat Bot"
          git config user.email "bot@aibeat.dev"

          NEW_FILE=$(git ls-files --others --exclude-standard content/articles/ | head -1)
          if [ -z "$NEW_FILE" ]; then
            echo "No new article (duplicate or failed). Skipping PR."
            exit 0
          fi

          SLUG=$(basename "$NEW_FILE" .mdx)
          BRANCH="draft/$SLUG"
          # Use python to safely extract the title — avoids sed quoting issues
          TITLE=$(python3 -c "
import re, sys
text = open('$NEW_FILE').read()
m = re.search(r'^title:\s*[\"\'](.*?)[\"\']', text, re.MULTILINE)
print(m.group(1) if m else '$SLUG')
")

          git checkout -b "$BRANCH"
          git add "$NEW_FILE"
          git commit -m "draft: ${SLUG}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Draft: $TITLE" \
            --body "$(printf 'AI-generated article — review before merging.\n\n**To publish:** read through, edit if needed, then merge.\n**To reject:** close the PR without merging.\n\nFile: \`%s\`' "$NEW_FILE")" \
            --base main

          echo "PR opened for: $TITLE"
