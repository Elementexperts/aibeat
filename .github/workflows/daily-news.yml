# AIBeat - Daily News Automation
# Runs 3x per day: 07:00 / 12:00 / 18:00 UTC
# Fetches AI news -> Groq writes article -> commits MDX -> Vercel deploys

name: Daily AI News Automation

on:
  schedule:
    - cron: '0 7  * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run news automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ARTICLE_LIMIT: 1
        run: npx tsx scripts/fetch-and-post.ts

      - name: Commit and push article
        run: |
          git config user.name "AIBeat Bot"
          git config user.email "bot@aibeat.dev"

          git add content/articles/

          if git diff --cached --quiet; then
            echo "No new article this run (duplicate or failed). Skipping commit."
            exit 0
          fi

          git pull --rebase origin main

          NEW_FILE=$(git diff --cached --name-only | grep 'content/articles/' | head -1)
          SLUG=$(basename "$NEW_FILE" .mdx)

          git commit -m "article: ${SLUG}"
          git push origin main

          echo "Published: ${SLUG}"
          echo "Live at: https://www.aibeat.dev/news/${SLUG}"