# ============================================================
# AIBeat — Daily News Automation
# Runs 3x per day: 7:00, 12:00, 18:00 UTC
# Fetches AI news → Groq writes article → commits to main → Vercel deploys
# ============================================================

name: Daily AI News Automation

on:
  schedule:
    - cron: '0 7  * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run news automation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          ARTICLE_LIMIT: 1
        run: npx tsx scripts/fetch-and-post.ts

      - name: Commit and publish article
        run: |
          git config user.name "AIBeat Bot"
          git config user.email "bot@aibeat.dev"

          NEW_FILE=$(git ls-files --others --exclude-standard content/articles/ | head -1)
          if [ -z "$NEW_FILE" ]; then
            echo "No new article (duplicate or failed). Nothing to commit."
            exit 0
          fi

          SLUG=$(basename "$NEW_FILE" .mdx)
          TITLE=$(python3 -c "
import re
text = open('$NEW_FILE').read()
m = re.search(r'^title:\s*[\"\'](.*?)[\"\']', text, re.MULTILINE)
print(m.group(1) if m else '$SLUG')
")

          git add "$NEW_FILE"
          git commit -m "publish: ${SLUG}"
          git push origin main

          echo "Published: $TITLE"
          echo "Live at: https://www.aibeat.dev/news/${SLUG}"
