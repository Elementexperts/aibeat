# ============================================================
# AIBeat — Daily News Automation
# Runs 3× per day: 7:00, 12:00, 18:00 UTC
# Fetches AI news → Groq writes article → saves to Sanity as draft
# One article per run to stay within Groq TPM rate limits
# ============================================================
 
name: Daily AI News Automation
 
on:
  schedule:
    - cron: '0 7  * * *'   # 07:00 UTC — Europe morning / Asia afternoon
    - cron: '0 12 * * *'   # 12:00 UTC — Global overlap peak
    - cron: '0 18 * * *'   # 18:00 UTC — Americas morning
  workflow_dispatch:        # Manual trigger from GitHub UI
 
jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
 
      - name: Install dependencies
        run: npm ci
 
      - name: Run news automation
        env:
          SANITY_API_TOKEN:              ${{ secrets.SANITY_API_TOKEN }}
          GROQ_API_KEY:                  ${{ secrets.GROQ_API_KEY }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: uk52fboh
          NEXT_PUBLIC_SANITY_DATASET:    production
          ARTICLE_LIMIT:                 1        # one article per run
        run: npx tsx scripts/fetch-and-post.ts
 
      - name: Report status
        if: always()
        run: echo "✅ Daily news automation complete ($(date -u '+%H:%M UTC'))"
 
